name: UI Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Run CI
      run: mvn clean test -Pci
      
    - name: Upload Allure results
      if: !cancelled()
      uses: actions/upload-artifact@v4
      with:
        name: Allure report
        path: target/allure-results
